<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <defs>
    <style type="text/css"><![CDATA[
      .shape { fill: #FFDAB9; stroke: #A0522D; stroke-width: 2; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .header { font-family: sans-serif; font-size: 16px; fill: #000; font-weight: bold; text-anchor: middle; }
    ]]></style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" class="header">Invoicing & Payments Workflow</text>

  <!-- Components -->
  <rect x="50" y="70" width="100" height="50" class="shape" />
  <text x="100" y="100" class="text">Sales Order/Service</text>

  <rect x="200" y="70" width="100" height="50" class="shape" />
  <text x="250" y="100" class="text">Invoice Generation</text>

  <rect x="350" y="70" width="100" height="50" class="shape" />
  <text x="400" y="100" class="text">Customer Payment</text>

  <rect x="500" y="70" width="100" height="50" class="shape" />
  <text x="550" y="100" class="text">Reconciliation</text>

  <rect x="250" y="170" width="100" height="50" class="shape" />
  <text x="300" y="200" class="text">Accounting Software</text>

  <!-- Arrows -->
  <line x1="150" y1="95" x2="200" y2="95" class="arrow" />
  <line x1="300" y1="95" x2="350" y2="95" class="arrow" />
  <line x1="450" y1="95" x2="500" y2="95" class="arrow" />
  <line x1="300" y1="120" x2="300" y2="170" class="arrow" />
  <line x1="400" y1="120" x2="350" y2="170" class="arrow" />

</svg>