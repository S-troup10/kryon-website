name: Capture screenshot (Playwright)

on:
  schedule:
    - cron: '0 */3 * * *' # every 3 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Setup Playwright
        uses: microsoft/playwright-github-action@v1
      - name: Capture screenshot
        run: |
          mkdir -p screenshots
          npx playwright --version
          npx playwright install --with-deps
          npx playwright screenshot "https://s-troup10.github.io/kryon-website/" screenshots/$(date -u +'%Y%m%dT%H%M%SZ').png --device="Desktop Chrome"
      - name: Commit screenshot
        run: |
          git config user.name "kryon-bot"
          git config user.email "kryon-bot@example.com"
          git add screenshots || true
          git commit -m "Screenshot: $(date -u)" || echo 'no changes'
          git push origin main || echo 'push failed'
