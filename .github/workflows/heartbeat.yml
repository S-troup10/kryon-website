name: Heartbeat & Codex run

on:
  schedule:
    - cron: '*/15 * * * *'  # every 15 minutes
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  ping-and-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Write heartbeat
        run: |
          echo "$(date -u) — heartbeat" >> HEARTBEAT.log
          git config user.name "kryon-bot"
          git config user.email "kryon-bot@example.com"
          git add HEARTBEAT.log || true
          git commit -m "Heartbeat: $(date -u)" || echo 'no changes'
          git push origin main || echo 'push failed'
      - name: Run codex improvement (push main)
        run: |
          node scripts/improve.js || echo 'improve script failed'
          git checkout main
          git add -A
          git commit -m "Auto-improve (heartbeat): $(date -u)" || echo 'no changes'
          git push origin main || echo 'push failed'
