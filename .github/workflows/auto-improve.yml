name: Auto Improve Site

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Merge staging into main and push
        run: |
          git config user.name "kryon-bot"
          git config user.email "kryon-bot@example.com"
          git fetch origin staging-improve || echo 'no staging branch'
          git checkout main
          if git rev-parse --verify origin/staging-improve >/dev/null 2>&1; then
            git merge --no-ff origin/staging-improve -m "Merge staging improvements" || echo 'merge conflict - creating PR'
            git push origin main || echo 'push failed'
          else
            echo 'no staging improvements to merge'
          fi
