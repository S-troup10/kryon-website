name: Auto Improve Site

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours
  workflow_dispatch: {}

jobs:
  improve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run improvement script
        run: |
          npm ci --no-audit || true
          node scripts/improve.js
      - name: Commit & push changes
        run: |
          git config user.name "kryon-bot"
          git config user.email "kryon-bot@example.com"
          git add -A
          git commit -m "Auto-improve: styling tweaks (cron)" || echo 'no changes'
          git push origin main
